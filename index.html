<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Product Form</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background-color: #2b2b2b;
      display: flex;
      justify-content: center;
      padding: 30px;
    }

    .page-container {
      width: 700px;
    }

    h2 {
      color: white;
    }

    .form-wrapper {
      background-color: white;
      border-radius: 6px;
      padding: 20px;
    }

    fieldset {
      border: 1px solid #aaa;
      border-radius: 4px;
      margin-bottom: 16px;
      padding: 10px 16px;
    }

    legend {
      font-size: 0.9em;
      color: #555;
      padding: 0 6px;
    }

    .form-row {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
    }

    .form-row label {
      width: 140px;
      font-size: 0.9em;
      color: #333;
      flex-shrink: 0;
    }

    .form-row input[type="text"],
    .form-row input[type="number"],
    .form-row input[type="email"],
    .form-row textarea,
    .form-row select {
      border: 1px solid #ccc;
      border-radius: 3px;
      padding: 4px 6px;
      font-size: 0.9em;
    }

    .form-row input[type="text"],
    .form-row input[type="number"],
    .form-row input[type="email"] {
      width: 200px;
    }

    .form-row textarea {
      width: 400px;
      height: 90px;
      resize: vertical;
    }

    .form-row .checkbox-group,
    .form-row .radio-group {
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 0.9em;
    }

    .submit-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 10px;
    }

    .submit-row button {
      background-color: #1a6fd4;
      color: white;
      border: none;
      border-radius: 4px;
      padding: 8px 18px;
      font-size: 0.95em;
      cursor: pointer;
    }

    .submit-row button:hover {
      background-color: #155bb5;
    }
  </style>
</head>
<body>
  <div class="page-container">
    <h2>Expected Form Render:</h2>
    <div class="form-wrapper">
      <form
        action="https://teach-backend-fawn.vercel.app/api/product"
        method="POST"
        enctype="multipart/form-data"
      >
        <!-- General Info -->
        <fieldset>
          <legend>General Info</legend>

          <div class="form-row">
            <label for="itemName">Item Name</label>
            <input type="text" id="itemName" name="itemName" value="" />
          </div>

          <div class="form-row">
            <label for="itemDescription">Description</label>
            <textarea id="itemDescription" name="itemDescription"></textarea>
          </div>

          <div class="form-row">
            <label for="category">Category</label>
            <select id="category" name="category">
              <option value="notSpecified" selected>notSpecified</option>
              <option value="consumption">consumption</option>
              <option value="household">household</option>
              <option value="electronic">electronic</option>
              <option value="gadget">gadget</option>
            </select>
          </div>
        </fieldset>

        <!-- Misc -->
        <fieldset>
          <legend>Misc.</legend>

          <div class="form-row">
            <label for="inventoryAmount">Inventory Amount</label>
            <input type="number" id="inventoryAmount" name="inventoryAmount" value="" />
          </div>

          <div class="form-row">
            <label for="listPrice">List price</label>
            <input type="number" id="listPrice" name="listPrice" value="" />
          </div>

          <div class="form-row">
            <label>Available Stores</label>
            <div class="checkbox-group">
              <input type="checkbox" id="bangkok" name="availableStore[]" value="Bangkok" checked />
              <label for="bangkok">Bangkok</label>
              <input type="checkbox" id="pattaya" name="availableStore[]" value="Pattaya" />
              <label for="pattaya">Pattaya</label>
              <input type="checkbox" id="phuket" name="availableStore[]" value="Phuket" />
              <label for="phuket">Phuket</label>
            </div>
          </div>
          <div class="form-row">
            <label>Available Stores</label>
            <div class="radio-group">
              <input type="radio" id="active" name="status" value="Active" checked />
              <label for="active">Active</label>
              <input type="radio" id="inactive" name="status" value="Inactive" />
              <label for="inactive">Inactive</label>
            </div>
          </div>
        </fieldset>

        <!-- Staff -->
        <fieldset>
          <legend>Staff</legend>
          <div class="form-row">
            <label for="staffEmail" style="color: red;">Staff Email</label>
            <input
              type="email"
              id="staffEmail"
              name="staffEmail"
              value="u6714506@au.edu"
            />
          </div>
        </fieldset>

        <div class="submit-row">
          <button type="submit">Submit Form</button>
        </div>

      </form>
    </div>
  </div>
</body>
</html>
